name: backfill

# One-shot Wayback Machine backfill, manual-dispatch only.
# Run this once after adding a new company or policy URL to seed the
# historical snapshot tree. Scheduled scraping does not run wayback
# because CDX + raw-capture fetches are slow and rarely needed.

on:
  workflow_dispatch:
    inputs:
      companies:
        description: "Comma-separated slugs (blank = all)"
        required: false
        default: ""
      months:
        description: "How many months back to pull"
        required: false
        default: "24"

permissions:
  contents: write

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"

      - name: Sync scrapers env
        working-directory: scrapers
        run: uv sync --frozen --extra dev

      - name: Run Wayback backfill
        working-directory: scrapers
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          args=(--source wayback --wayback-months "${{ inputs.months }}")
          if [ -n "${{ inputs.companies }}" ]; then
            args+=(--companies "${{ inputs.companies }}")
          fi
          uv run python -m scrapers.main "${args[@]}"

      - name: Commit raw data changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add data/raw
          if git diff --cached --quiet; then
            echo "No wayback captures to commit."
            exit 0
          fi
          git pull --rebase --autostash
          git commit -m "backfill: import Wayback snapshots"
          git push
