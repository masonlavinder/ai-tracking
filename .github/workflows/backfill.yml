name: backfill

# Wayback Machine backfill, manual-dispatch only, parallelized across
# runners. One job per company fans out, each uploads its own raw
# snapshots as an artifact, and a final commit job downloads all of
# them and pushes a single commit.
#
# Two pieces of rudeness-control:
#
# - `max-parallel` caps concurrent runners because every fetch goes
#   through web.archive.org and 12 runners hammering at once gets us
#   throttled.
# - The scraper itself still enforces a 2s per-host delay inside each
#   runner, so within a single job requests stay polite.

on:
  workflow_dispatch:
    inputs:
      companies:
        description: "Comma-separated slugs (blank = all registered companies)"
        required: false
        default: ""
      months:
        description: "How many months back to pull"
        required: false
        default: "24"

permissions:
  contents: write

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      companies: ${{ steps.pick.outputs.companies }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"

      - name: Sync scrapers env
        working-directory: scrapers
        run: uv sync --frozen --extra dev

      - name: Resolve company list
        id: pick
        working-directory: scrapers
        env:
          RAW_INPUT: ${{ inputs.companies }}
        run: |
          set -euo pipefail
          raw="${RAW_INPUT:-}"
          if [ -z "$raw" ]; then
            raw=$(uv run python -c "from scrapers.config import all_slugs; print(','.join(all_slugs()))")
          fi
          json=$(echo "$raw" | tr ',' '\n' | sed 's/[[:space:]]//g' | awk 'NF' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "companies=$json" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json"

  backfill:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        company: ${{ fromJSON(needs.plan.outputs.companies) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"

      - name: Sync scrapers env
        working-directory: scrapers
        run: uv sync --frozen --extra dev

      - name: Run Wayback backfill for ${{ matrix.company }}
        working-directory: scrapers
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          uv run python -m scrapers.main \
            --source wayback \
            --wayback-months ${{ inputs.months }} \
            --companies ${{ matrix.company }}

      - name: Upload snapshots for ${{ matrix.company }}
        uses: actions/upload-artifact@v4
        with:
          name: raw-policies-${{ matrix.company }}
          path: data/raw/policies/${{ matrix.company }}/
          if-no-files-found: ignore
          retention-days: 1

  commit:
    needs: backfill
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/backfill
          pattern: raw-policies-*

      - name: Merge artifacts into data/raw/policies/
        run: |
          set -euo pipefail
          shopt -s nullglob
          any_artifact=0
          for dir in /tmp/backfill/raw-policies-*; do
            any_artifact=1
            slug=$(basename "$dir" | sed 's/^raw-policies-//')
            mkdir -p "data/raw/policies/$slug"
            cp -rn "$dir/." "data/raw/policies/$slug/" || true
          done
          if [ "$any_artifact" -eq 0 ]; then
            echo "No artifacts produced by any matrix job."
          fi

      - name: Commit raw data changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add data/raw
          if git diff --cached --quiet; then
            echo "No wayback captures to commit."
            exit 0
          fi
          git pull --rebase --autostash
          git commit -m "backfill: import Wayback snapshots"
          git push
